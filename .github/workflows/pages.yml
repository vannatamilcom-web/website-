name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Fetch Facebook posts
        run: node scripts/fetch-facebook-posts.mjs
        continue-on-error: true
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_LONG_TOKEN: ${{ secrets.FB_LONG_TOKEN }}
          FB_SHORT_TOKEN: ${{ secrets.FB_SHORT_TOKEN }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          FACEBOOK_GRAPH_VERSION: ${{ secrets.FACEBOOK_GRAPH_VERSION }}
          FACEBOOK_POST_LIMIT: 30

      - name: Fetch Instagram posts
        run: node scripts/fetch-instagram-posts.mjs
        continue-on-error: true
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_GRAPH_VERSION: ${{ secrets.INSTAGRAM_GRAPH_VERSION }}
          INSTAGRAM_POST_LIMIT: ${{ secrets.INSTAGRAM_POST_LIMIT }}

      - name: Fetch YouTube videos
        run: node scripts/fetch-youtube-videos.mjs
        continue-on-error: true
        env:
          YOUTUBE_CHANNEL_ID: ${{ secrets.VITE_YOUTUBE_CHANNEL_ID }}
          YOUTUBE_VIDEO_LIMIT: ${{ secrets.YOUTUBE_VIDEO_LIMIT }}

      - name: Build
        run: npm run build
        env:
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
          VITE_YOUTUBE_CHANNEL_ID: ${{ secrets.VITE_YOUTUBE_CHANNEL_ID }}
          VITE_YOUTUBE_LIVE_VIDEO_ID: ${{ secrets.VITE_YOUTUBE_LIVE_VIDEO_ID }}
          VITE_FACEBOOK_URL: ${{ secrets.VITE_FACEBOOK_URL }}
          VITE_FACEBOOK_PAGE_URL: ${{ secrets.VITE_FACEBOOK_PAGE_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
